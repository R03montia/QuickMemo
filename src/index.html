<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickMemo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../assets/editor/toastui-editor.min.css">
  <link rel="stylesheet" href="../assets/editor/toastui-editor-dark.css">
  <link rel="stylesheet" href="../assets/editor/toastui-editor-plugin-code-syntax-highlight.min.css">
</head>
<body>
  <!-- 有边框模式标题栏 -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <span id="app-title-bar">QuickMemo</span>
    </div>
    <div id="titlebar-controls">
      <button class="title-btn" id="btn-minimize-bar" title="最小化">─</button>
      <button class="title-btn" id="btn-maximize-bar" title="最大化">□</button>
      <button class="title-btn title-btn-close" id="btn-close-bar" title="关闭">✕</button>
    </div>
  </div>

  <!-- 无边框模式浮动控件 -->
  <div id="window-controls">
    <button class="ctl-btn" id="btn-minimize" title="最小化">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="2" y1="6" x2="10" y2="6"/></svg>
    </button>
    <button class="ctl-btn" id="btn-maximize" title="最大化">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1.5" y="1.5" width="9" height="9" rx="1"/></svg>
    </button>
    <button class="ctl-btn ctl-close" id="btn-close" title="关闭">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
    </button>
  </div>

  <div id="app-container">
    <aside id="sidebar">
      <div id="sidebar-header" class="drag-region">
        <button id="btn-new-note">
          <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
          新建笔记
        </button>
      </div>
      <div id="multi-toolbar" style="display:none;">
        <span id="multi-count">已选 0 项</span>
        <button id="btn-multi-delete" title="批量删除"></button>
        <button id="btn-multi-reminder" title="批量设置提醒"></button>
        <button id="btn-multi-done">取消</button>
      </div>
      <div id="note-list"></div>
      <div id="settings-nav" style="display:none;">
        <div class="settings-nav-item active" data-section="theme">主题</div>
        <div class="settings-nav-item" data-section="appearance">窗口样式</div>
        <div class="settings-nav-item" data-section="opacity">不透明度</div>
        <div class="settings-nav-item" data-section="editor">编辑器</div>
      </div>
      <div id="slider-panel"></div>
      <button id="btn-settings" title="设置">⚙</button>
    </aside>

    <main id="main-content">
      <div id="main-drag" class="drag-region"></div>
      <div id="empty-state">
        <div id="empty-icon">
          <svg class="icon icon-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <p>选择左侧笔记，或点击「新建笔记」开始</p>
      </div>

      <div id="settings-section" style="display:none;">
        <div id="section-theme" class="settings-page">
          <div class="settings-page-header">主题</div>
          <div class="settings-page-body">
            <div class="settings-options">
              <button class="settings-option" data-action="theme" data-value="system">跟随系统</button>
              <button class="settings-option" data-action="theme" data-value="light">浅色</button>
              <button class="settings-option" data-action="theme" data-value="dark">深色</button>
            </div>
          </div>
        </div>
        <div id="section-appearance" class="settings-page" style="display:none;">
          <div class="settings-page-header">窗口样式</div>
          <div class="settings-page-body">
            <div class="settings-options">
              <button class="settings-option" data-action="appearance" data-value="bordered">有边框</button>
              <button class="settings-option" data-action="appearance" data-value="borderless">无边框</button>
            </div>
          </div>
        </div>
        <div id="section-opacity" class="settings-page" style="display:none;">
          <div class="settings-page-header">不透明度</div>
          <div class="settings-page-body">
            <div class="settings-slider-wrap">
              <input type="range" class="slider-input" id="settings-opacity-range" min="10" max="100" value="82">
              <span class="slider-value" id="settings-opacity-value">82%</span>
            </div>
          </div>
        </div>
        <div id="section-editor" class="settings-page" style="display:none;">
          <div class="settings-page-header">编辑器</div>
          <div class="settings-page-body">
            <div class="editor-toggle-item">
              <div class="editor-toggle-label">
                <span class="editor-toggle-title">普通笔记 Markdown</span>
                <span class="editor-toggle-desc">新建和编辑普通笔记时默认使用所见即所得 Markdown 编辑器</span>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="toggle-md-global" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="editor-toggle-item">
              <div class="editor-toggle-label">
                <span class="editor-toggle-title">Notems 笔记 Markdown</span>
                <span class="editor-toggle-desc">从 note.ms 获取的笔记也使用 Markdown 渲染</span>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" id="toggle-md-notems">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <div id="note-editor" style="display:none;">
        <div id="editor-header">
          <input type="text" id="note-title" placeholder="笔记标题">
          <div id="reminder-section">
            <button id="btn-refresh-notems" title="从 note.ms 刷新" style="display:none;">
              <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 10a7 7 0 0 1-14 0M3 7V3h4"/><path d="M3 3l4 4"/></svg>
            </button>
            <button id="btn-reminder" title="设置提醒">
              <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7A5 5 0 0 0 5 7c0 5.5-2.5 7.5-2.5 7.5h15S15 12.5 15 7"/><path d="M11.4 16.5a1.5 1.5 0 0 1-2.8 0"/></svg>
              提醒
            </button>
            <div id="reminder-picker" style="display:none;">
              <div class="picker-title"><svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7A5 5 0 0 0 5 7c0 5.5-2.5 7.5-2.5 7.5h15S15 12.5 15 7"/><path d="M11.4 16.5a1.5 1.5 0 0 1-2.8 0"/></svg> 设置提醒</div>
              <div class="custom-datepicker" id="custom-datepicker">
                <div class="cal-header">
                  <button class="cal-nav" data-action="prev">‹</button>
                  <span class="cal-month-year" id="cal-month-year"></span>
                  <button class="cal-nav" data-action="next">›</button>
                </div>
                <div class="cal-weekdays">
                  <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="cal-days" id="cal-days"></div>
                <div class="cal-time-row">
                  <svg class="icon cal-clock-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><polyline points="10 6 10 10 13 13"/></svg>
                  <div class="time-wheel" id="time-wheel">
                    <div class="tw-column" id="tw-hours-col">
                      <div class="tw-items" id="tw-hours-items"></div>
                    </div>
                    <span class="tw-sep">:</span>
                    <div class="tw-column" id="tw-minutes-col">
                      <div class="tw-items" id="tw-minutes-items"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="picker-actions">
                <button id="btn-set-reminder" class="picker-primary">确定</button>
                <button id="btn-cancel-reminder" class="picker-cancel">取消</button>
              </div>
            </div>
            <span id="reminder-badge" style="display:none;"></span>
            <button id="btn-cancel-reminder-badge" title="取消提醒" style="display:none;">
              <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="5" x2="15" y2="15"/><line x1="15" y1="5" x2="5" y2="15"/></svg>
            </button>
          </div>
        </div>
        <div id="note-body-container"></div>
        <div id="note-footer">
          <span id="note-status">已自动保存</span>
          <button id="btn-delete-note" title="删除">
            <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h14"/><path d="M16 6v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6"/><path d="M8 6V4.5A1.5 1.5 0 0 1 9.5 3h1A1.5 1.5 0 0 1 12 4.5V6"/></svg>
          </button>
        </div>
        <button id="btn-scroll-bottom" title="滚动到底">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 8 10 12 14 8"/>
            <polyline points="6 12 10 16 14 12"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <!-- 右键菜单 -->
  <div id="context-menu" class="context-menu" style="display:none;">
    <div class="context-menu-item" data-action="rename">
      <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 3.5l3 3L7 16H4v-3l9.5-9.5z"/></svg>
      重命名
    </div>
    <div class="context-menu-separator"></div>
    <div class="context-menu-item" data-action="delete">
      <svg class="icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h14"/><path d="M15 5v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5"/><path d="M8 5V3.5A1.5 1.5 0 0 1 9.5 2h1A1.5 1.5 0 0 1 12 3.5V5"/></svg>
      删除
    </div>
  </div>

  <!-- 确认对话框 -->
  <div id="confirm-overlay" style="display:none;">
    <div id="confirm-dialog">
      <div id="confirm-text"></div>
      <div class="notems-footer">
        <button id="confirm-cancel" class="picker-cancel">取消</button>
        <button id="confirm-ok" class="picker-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- Note.ms 对话框 -->
  <div id="notems-overlay" style="display:none;">
    <div id="notems-dialog">
      <div class="notems-header">
        <span>获取 Notems 内容</span>
        <button id="notems-close" class="ctl-btn" title="关闭">✕</button>
      </div>
      <div class="notems-body">
        <p class="notems-hint">输入标识符，将拉取 note.ms/<strong>标识符</strong> 的内容</p>
        <input type="text" id="notems-input" placeholder="输入标识符..." class="notems-input" spellcheck="false">
        <div id="notems-error" class="notems-error" style="display:none;"></div>
      </div>
      <div class="notems-footer">
        <button id="notems-cancel" class="picker-cancel">取消</button>
        <button id="notems-confirm" class="picker-primary">获取</button>
      </div>
    </div>
  </div>

  <script src="../assets/editor/toastui-editor-all.min.js"></script>
  <script src="../assets/editor/toastui-editor-plugin-code-syntax-highlight-all.min.js"></script>
  <script src="markdown-editor.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
